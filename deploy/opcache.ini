; Place at: /etc/php/8.x/fpm/conf.d/10-opcache.ini  (adjust 8.x to the Pi's
; actual PHP version -- check with `php -v` first, see RUNBOOK.md Phase 0).
;
; Free, biggest single win: without this, PHP recompiles every .php file on
; every single request. With it, each file is compiled once and the
; bytecode is cached in shared memory -- this is also what makes minifying
; PHP source pointless (see OPTIMIZATION.md "On minification").

opcache.enable=1
opcache.memory_consumption=32
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=100     ; this app has ~12 PHP files
opcache.validate_timestamps=1
opcache.revalidate_freq=60

; Verify after restarting php-fpm:
;   php -i | grep opcache.enable
