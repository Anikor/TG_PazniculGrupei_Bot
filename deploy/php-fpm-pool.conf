; Pool tuning for a Pi Zero 2W (4 cores, 512MB). Edit the values in your
; existing pool file (commonly /etc/php/8.x/fpm/pool.d/www.conf) -- this
; isn't a drop-in conf.d file like opcache.ini, since a pool's [www] block
; usually already exists and needs editing in place, not duplicating.

pm = ondemand              ; don't hold workers for a class of 30 all day
pm.max_children = 4
pm.process_idle_timeout = 10s
pm.max_requests = 500      ; recycle workers periodically to cap memory drift

; Restart after editing: sudo systemctl restart php8.x-fpm
